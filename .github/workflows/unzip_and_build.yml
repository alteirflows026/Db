name: Universal Native Android Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    # Tambahin environment variable untuk Android
    env:
      ANDROID_HOME: /usr/local/android-sdk
      ANDROID_SDK_ROOT: /usr/local/android-sdk
      
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Setup Java dulu
      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # Install SDK components pake sdkmanager langsung
      - name: Install Android SDK Components
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platform-tools" \
            "platforms;android-33" \
            "build-tools;33.0.0"
        continue-on-error: true  # Kalo gagal, lanjut aja

      # Extract zip (handle spasi)
      - name: Extract Main Zip
        run: |
          # Cari file zip utama
          ZIP_FILE=$(find . -maxdepth 1 -name "*.zip" -not -name "*kontrol*" | head -n 1)
          if [ -z "$ZIP_FILE" ]; then
            echo "❌ Tidak ditemukan file zip!"
            exit 1
          fi
          
          echo "📦 Extracting: $ZIP_FILE"
          unzip -o "$ZIP_FILE"
          
          # Hapus zip setelah extract
          rm "$ZIP_FILE"

      # Build Android APK
      - name: Build Android APK
        run: |
          # Cari folder android
          ANDROID_DIR=$(find . -type d -name "android" -not -path "./.github/*" | head -n 1)
          
          if [ -z "$ANDROID_DIR" ]; then
            echo "❌ Folder android tidak ditemukan!"
            echo "📂 Isi direktori:"
            ls -la
            exit 1
          fi
          
          echo "🎯 Found android at: $ANDROID_DIR"
          cd "$ANDROID_DIR"
          
          # Cek gradlew
          if [ ! -f "gradlew" ]; then
            echo "❌ gradlew not found!"
            exit 1
          fi
          
          # Kasih permission
          chmod +x gradlew
          
          # Build dengan gradle
          ./gradlew assembleRelease --stacktrace --no-daemon

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Hasil-Base-APK-Native
          path: |
            **/build/outputs/apk/release/*.apk
            **/build/outputs/apk/debug/*.apk
          continue-on-error: true
